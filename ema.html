║  WhatsApp: número en los onclick de los botones de opciones  ║

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --pink: #f0436a;
  --gold: #e8c97a;
  --ink: #f5f0eb;
  --ink2: #9a9090;

  /* ══ AJUSTES DEL VIDEO ══════════════════════════════════════
     --video-max-width: ancho en móvil (desktop se agranda solo)
     --video-ratio: 16/9 = horizontal | 9/16 = vertical (reel)
     --video-radius: redondeo de esquinas
  ══════════════════════════════════════════════════════════ */
  --video-max-width: 420px;
  --video-ratio: 16/9;
  --video-radius: 20px;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 32px 16px 60px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, #2a0a14 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 80%, #0a1a2a 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

/* ── HEADER ── */
.header {
  text-align: center;
  animation: fadeDown .7s ease both;
}
.header .eyebrow {
  font-size: .7rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--pink);
  margin-bottom: 8px;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 6vw, 2.2rem);
  font-style: italic;
  line-height: 1.2;
}
.header h1 span { color: var(--gold); font-style: normal; }

/* ── VIDEO ── */
.video-wrap {
  width: 100%;
  max-width: var(--video-max-width);
  border-radius: var(--video-radius);
  overflow: hidden;
  position: relative;
  background: #111;
  animation: fadeUp .8s .2s ease both;
  box-shadow: 0 0 0 1px rgba(240,67,106,.25), 0 20px 60px rgba(0,0,0,.7);
}
.video-wrap video {
  width: 100%;
  display: block;
  aspect-ratio: var(--video-ratio);
  object-fit: cover;
}
.video-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--video-radius);
  border: 1px solid rgba(240,67,106,.2);
  pointer-events: none;
  z-index: 1;
}

/* ── FLECHA ── */
.arrow-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  animation: fadeUp .8s .4s ease both;
}
.arrow-label {
  font-size: .68rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--pink);
}
.arrow { font-size: 1.5rem; animation: arrowBounce 1s ease infinite; }

/* ── BOTÓN ABRIR SORPRESA ── */
.surprise-btn {
  width: 100%;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  animation: fadeUp .8s .5s ease both;
}
.surprise-inner {
  width: 100%;
  padding: 26px 24px;
  border-radius: 16px;
  border: 2px solid rgba(240,67,106,.6);
  background: linear-gradient(135deg, rgba(240,67,106,.15), rgba(10,10,10,.7));
  text-align: center;
  transition: all .25s ease;
  box-shadow: 0 0 30px rgba(240,67,106,.15);
}
.surprise-btn:hover .surprise-inner,
.surprise-btn:active .surprise-inner {
  border-color: var(--pink);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(240,67,106,.25);
}
.surprise-emoji { font-size: 2rem; display: block; margin-bottom: 8px; animation: bounce 2s 2s ease infinite; }
.surprise-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  line-height: 1.4;
  color: var(--ink);
}
.surprise-text small {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: .7rem;
  color: var(--gold);
  margin-top: 5px;
}

/* ── PANEL DE OPCIONES ── */
.options-panel {
  width: 100%;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height .6s cubic-bezier(.4,0,.2,1), opacity .4s ease;
}
.options-panel.open {
  max-height: 900px;
  opacity: 1;
}

.options-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-style: italic;
  color: var(--ink2);
  text-align: center;
  margin-bottom: 16px;
  padding-top: 4px;
}

/* ── TARJETAS DE OPCIÓN ── */
.option-card {
  width: 100%;
  border: none;
  background: none;
  padding: 0;
  cursor: pointer;
  margin-bottom: 12px;
  display: block;
}
.option-card-inner {
  width: 100%;
  padding: 20px;
  border-radius: 14px;
  border: 1.5px solid var(--card-border, rgba(255,255,255,.1));
  background: var(--card-bg, rgba(255,255,255,.04));
  transition: all .2s ease;
  display: flex;
  align-items: center;
  gap: 16px;
}
.option-card:hover .option-card-inner,
.option-card:active .option-card-inner {
  transform: translateY(-2px);
  border-color: var(--card-accent, var(--pink));
  box-shadow: 0 6px 24px var(--card-shadow, rgba(240,67,106,.2));
}
.option-icon { font-size: 2rem; flex-shrink: 0; }
.option-body { flex: 1; text-align: left; }
.option-label {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--ink);
  margin-bottom: 3px;
}
.option-sub { font-size: .72rem; color: var(--ink2); line-height: 1.4; }
.option-arrow { font-size: 1rem; color: var(--ink2); flex-shrink: 0; transition: transform .2s; }
.option-card:hover .option-arrow { transform: translateX(3px); color: var(--ink); }

/* colores por tarjeta */
.card-cine  { --card-border: rgba(232,201,122,.3); --card-bg: rgba(232,201,122,.05); --card-accent: var(--gold);  --card-shadow: rgba(232,201,122,.2); }
.card-comer { --card-border: rgba(240,130,67,.3);  --card-bg: rgba(240,130,67,.05);  --card-accent: #f08243;      --card-shadow: rgba(240,130,67,.2); }
/* Para tus opciones personales podés agregarle una clase .card-X con colores propios */

/* Tarjetas ocultas: cambiá display:none a display:block para activarlas */
.card-hidden { display: none; }

/* ── CONTROLES ── */
.controls-row {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: var(--video-max-width);
  animation: fadeUp .8s .3s ease both;
}
.ctrl-btn {
  flex: 1;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1.5px solid rgba(240,67,106,.4);
  background: rgba(240,67,106,.08);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: .72rem;
  letter-spacing: .05em;
  cursor: pointer;
  transition: all .2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.ctrl-btn:hover, .ctrl-btn:active {
  background: rgba(240,67,106,.18);
  border-color: var(--pink);
}
.ctrl-btn.active {
  background: rgba(240,67,106,.25);
  border-color: var(--pink);
}

/* ── FOOTER ── */
.footer {
  font-size: .6rem;
  color: #3a3535;
  letter-spacing: .08em;
  text-transform: uppercase;
  animation: fadeUp .8s .7s ease both;
}

/* ── ANIMACIONES ── */
@keyframes fadeDown    { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp      { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:translateY(0)} }
@keyframes bounce      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes arrowBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(7px)} }

/* ── PANTALLA DE CARGA ── */
#intro-overlay {
  position: fixed;
  inset: 0;
  background: #05050f;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  transition: opacity 1s ease, visibility 1s ease;
}
#intro-overlay.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.poro-wrap {
  animation: poroFloat 2s ease-in-out infinite;
}
.poro-wrap img {
  width: min(220px, 55vw);
  height: auto;
  border-radius: 16px;
  display: block;
  object-fit: contain;
}
@keyframes poroFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}
.loading-label {
  font-family: 'DM Sans', sans-serif;
  font-size: .7rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: #9a9090;
}
.progress-bar-wrap {
  width: min(280px, 70vw);
  height: 6px;
  background: rgba(255,255,255,.08);
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #f0436a, #e8c97a);
  border-radius: 4px;
  transition: width .05s linear;
}

.container {
  animation: containerIn 1s ease both;
}
@keyframes containerIn { from{opacity:0} to{opacity:1} }

/* ── DESKTOP: video más grande ── */
@media (min-width: 768px) {
  :root {
    --video-max-width: 700px;
  }
  .container {
    max-width: 700px;
  }
  .controls-row {
    max-width: 700px;
  }
}
</style>
</head>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="eyebrow">✨ para vos</div>
    <h1>Una pequeña<br><span>sorpresa</span> 🎬</h1>
  </div>

  <!-- VIDEO
       src="video.mp4" → el archivo tiene que estar en el mismo repo con ese nombre
       Para usar otro nombre: src="micumple.mp4" → subir micumple.mp4 a GitHub
       Para usar URL externa (ej Cloudinary): src="https://res.cloudinary.com/.../video.mp4"
       muted → obligatorio para autoplay en Chrome/Safari móvil
       El botón 🔇 Sonido desbloquea el audio con un tap del usuario
  -->
  <div class="video-wrap">
    <video src="emanuel.mp4" autoplay loop muted playsinline id="vid"></video>
  </div>

  <!-- CONTROLES: sonido -->
  <div class="controls-row">
    <button class="ctrl-btn" id="btn-sound" onclick="toggleSonido()">🔇 Sonido</button>
  </div>

  <!-- FLECHA -->
  <div class="arrow-wrap">
    <span class="arrow-label">mirá acá abajo</span>
    <span class="arrow">⬇️</span>
  </div>

  <!-- BOTÓN PRINCIPAL -->
  <button class="surprise-btn" onclick="abrirOpciones()">
    <div class="surprise-inner">
      <span class="surprise-emoji">🎁</span>
      <div class="surprise-text">
        Hacé click acá para ver la sorpresa
        <small>te va a gustar, prometido</small>
      </div>
    </div>
  </button>

  <!-- PANEL CON OPCIONES (se despliega al hacer click) -->
  <div class="options-panel" id="options-panel">

    <div class="options-title">¿Qué te parece si…?</div>

    <!-- ══ OPCIÓN 1: CINE ══ -->
    <button class="option-card card-cine" onclick="window.open('https://wa.me/5491161443954?text=¿Vamos%20al%20cine?%20🍿','_blank')">

        <div class="option-icon">🎬</div>
        <div class="option-body">
          <div class="option-label">Ir al cine</div>
          <div class="option-sub">Una peli, pochoclo y buena compañía 🍿</div>
        </div>
        <div class="option-arrow">→</div>
      </div>
    </button>

    <!-- ══ OPCIÓN 2: COMER ══ -->
    <button class="option-card card-comer" onclick="window.open('https://wa.me/5491161443954?text=¿Comemos%20algo%20juntos?%20🍕','_blank')">
      <div class="option-card-inner">
        <div class="option-icon">🍕</div>
        <div class="option-body">
          <div class="option-label">Salir a comer</div>
          <div class="option-sub">Algo rico, buena charla y quien sabe 😏</div>
        </div>
        <div class="option-arrow">→</div>
      </div>
    </button>

    <!-- ══ OPCIÓN 3: TUYA
         Para activar: borrá class="card-hidden" (dejá solo class="option-card")
         Mensaje WA: codificá en urlencoder.org y pegá en el onclick
    ══ -->
    <button class="option-card card-hidden" onclick="enviarWA('TU_MENSAJE_ACÁ_CODIFICADO')">
      <div class="option-card-inner">
        <div class="option-icon">✨</div>
        <div class="option-body">
          <div class="option-label">Tu opción acá</div>
          <div class="option-sub">Tu descripción acá</div>
        </div>
        <div class="option-arrow">→</div>
      </div>
    </button>

    <!-- ══ OPCIÓN 4: TUYA — igual que opción 3 ══ -->
    <button class="option-card card-hidden" onclick="enviarWA('TU_MENSAJE_ACÁ_CODIFICADO')">
      <div class="option-card-inner">
        <div class="option-icon">🎉</div>
        <div class="option-body">
          <div class="option-label">Tu opción acá</div>
          <div class="option-sub">Tu descripción acá</div>
        </div>
        <div class="option-arrow">→</div>

  </div><!-- fin options-panel -->

  <div class="footer">hecho con 🖤</div>

</div>

<script>
  // ── BARRA DE CARGA ──
  let prog = 0;
  const fill = document.getElementById('progress-fill');
  const overlay = document.getElementById('intro-overlay');
  const interval = setInterval(() => {
    prog += Math.random() * 4 + 1;
    if (prog >= 100) {
      prog = 100;
      fill.style.width = '100%';
      clearInterval(interval);
      setTimeout(() => overlay.classList.add('hide'), 400);
    } else {
      fill.style.width = prog + '%';
    }
  }, 40);

  function toggleSonido() {
    const vid = document.getElementById('vid');
    const btn = document.getElementById('btn-sound');
    vid.muted = !vid.muted;
    btn.textContent = vid.muted ? '🔇 Sonido' : '🔊 Sonido';
    btn.classList.toggle('active', !vid.muted);
  }

  function abrirOpciones() {
    const panel = document.getElementById('options-panel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
    }
  }

  function enviarWA(mensajeCodificado) {
    window.open('https://wa.me/' + WA_NUMBER + '?text=' + mensajeCodificado, '_blank');
  }

</script>
