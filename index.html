<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una sorpresa para vos 🎬</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --pink: #f0436a;
  --pink2: #ff7096;
  --gold: #e8c97a;
  --ink: #f5f0eb;
  --ink2: #9a9090;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px 48px;
  overflow-x: hidden;
}

/* Fondo con grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, #2a0a14 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 80%, #0a1a2a 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

/* Header */
.header {
  text-align: center;
  animation: fadeDown .7s ease both;
}
.header .eyebrow {
  font-size: .7rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--pink);
  margin-bottom: 8px;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 6vw, 2.2rem);
  font-style: italic;
  color: var(--ink);
  line-height: 1.2;
}
.header h1 span { color: var(--gold); font-style: normal; }

/* Video wrapper mp4 */
.video-wrap {
  width: 100%;
  max-width: 340px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(240,67,106,.25),
    0 20px 60px rgba(0,0,0,.7),
    0 0 80px rgba(240,67,106,.08);
  animation: fadeUp .8s .2s ease both;
  background: #111;
}

.video-wrap video {
  width: 100%;
  display: block;
  aspect-ratio: 9/16;
  object-fit: cover;
}

/* Overlay sutil en bordes del video */
.video-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  border: 1px solid rgba(240,67,106,.2);
  pointer-events: none;
  z-index: 1;
}

/* Separador */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  animation: fadeUp .8s .4s ease both;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(240,67,106,.3), transparent);
}
.divider span {
  font-size: .65rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--ink2);
}

/* Flecha animada */
.arrow-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  animation: fadeUp .8s .45s ease both;
}
.arrow-label {
  font-size: .7rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--pink);
}
.arrow {
  font-size: 1.6rem;
  animation: arrowBounce 1s ease infinite;
  display: block;
}
@keyframes arrowBounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(7px); }
}

/* Botón sorpresa */
.surprise-btn {
  width: 100%;
  position: relative;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  animation: fadeUp .8s .5s ease both;
}

.surprise-inner {
  width: 100%;
  padding: 26px 24px;
  border-radius: 16px;
  border: 2px solid rgba(240,67,106,.6);
  background: linear-gradient(135deg, rgba(240,67,106,.15), rgba(10,10,10,.7));
  backdrop-filter: blur(10px);
  text-align: center;
  transition: all .25s ease;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(240,67,106,.15), inset 0 1px 0 rgba(255,255,255,.05);
}

.surprise-btn:hover .surprise-inner,
.surprise-btn:active .surprise-inner {
  border-color: var(--pink);
  background: linear-gradient(135deg, rgba(240,67,106,.18), rgba(20,10,12,.8));
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(240,67,106,.2);
}

.surprise-emoji {
  font-size: 2rem;
  display: block;
  margin-bottom: 8px;
  animation: bounce 2s 2s ease infinite;
}

.surprise-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  color: var(--ink);
  line-height: 1.4;
}
.surprise-text small {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: .7rem;
  color: var(--ink2);
  margin-top: 5px;
  font-style: normal;
  letter-spacing: .05em;
}

/* Panel de número oculto */
.number-panel {
  width: 100%;
  border-radius: 14px;
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height .5s cubic-bezier(.4,0,.2,1), opacity .4s ease, margin .4s ease;
  margin-top: 0;
}

.number-panel.open {
  max-height: 300px;
  opacity: 1;
  margin-top: 0;
}

.number-inner {
  padding: 28px 20px 24px;
  background: linear-gradient(160deg, #0d1f1c, #0a0a14);
  border: 1.5px solid rgba(37,211,102,.25);
  border-radius: 14px;
  text-align: center;
}

.wa-surprise-icon {
  font-size: 2.4rem;
  margin-bottom: 10px;
  animation: bounce 1.5s ease infinite;
}

.wa-surprise-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--ink);
  margin-bottom: 6px;
}

.wa-surprise-sub {
  font-size: .75rem;
  color: var(--ink2);
  margin-bottom: 18px;
  letter-spacing: .03em;
}

.wa-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px 20px;
  background: linear-gradient(135deg, #25d366, #1aad52);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: all .2s;
  letter-spacing: .02em;
  box-shadow: 0 4px 20px rgba(37,211,102,.3);
}
.wa-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,211,102,.4); }
.wa-btn:active { transform: scale(.98); }

/* Footer */
.footer {
  font-size: .6rem;
  color: #3a3535;
  letter-spacing: .08em;
  text-transform: uppercase;
  animation: fadeUp .8s .7s ease both;
}

/* Animations */
@keyframes fadeDown {
  from { opacity:0; transform:translateY(-16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="eyebrow">✨ para vos</div>
    <h1>Una pequeña<br><span>sorpresa</span> 🎬</h1>
  </div>

  <div class="video-wrap">
    <video src="video.mp4" autoplay loop muted playsinline></video>
  </div>

  <div class="arrow-wrap" id="arrow-hint">
    <span class="arrow-label">mirá acá abajo 👇</span>
    <span class="arrow">⬇️</span>
  </div>

  <button class="surprise-btn" id="surprise-btn" onclick="toggleSurprise()">
    <div class="surprise-inner">
      <span class="surprise-emoji">🎁</span>
      <div class="surprise-text">
        Hacé click acá para ver la sorpresa
        <small>te va a gustar, prometido</small>
      </div>
    </div>
  </button>

  <div class="number-panel" id="panel">
    <div class="number-inner">
      <div class="wa-surprise-icon">💬</div>
      <div class="wa-surprise-title">¡Tu sorpresa te espera!</div>
      <div class="wa-surprise-sub">Tocá el botón para descubrirla 🎁</div>
      <a class="wa-btn" href="https://wa.me/5491161443954?text=Me%20gustar%C3%ADa%20ir%20con%20vos%20al%20cine%20%F0%9F%A4%AD" target="_blank">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.122 1.528 5.856L.057 23.882l6.19-1.624A11.937 11.937 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.8 9.8 0 01-5.012-1.374l-.36-.214-3.724.977.994-3.63-.234-.373A9.775 9.775 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
        Abrir WhatsApp
      </a>
    </div>
  </div>

  <div class="footer">hecho con 🖤</div>

</div>

<script>
function toggleSurprise() {
  const panel = document.getElementById('panel');
  panel.classList.toggle('open');
}
</script>

</body>
</html>
